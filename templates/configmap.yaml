apiVersion: v1
kind: ConfigMap
metadata:
  name: keep-admin-config
data:
  application.yml: |
    spring:
      application:
        name: keep-admin
      config:
        groups:
          default: application
          dev: application,application-dev
      mvc:
        view:
          prefix: /WEB-INF/views/
          suffix: .jsp

    admin:
      id: admin
      password: epa123!@#

    server:
      port: 8080

    mybatis:
      mapper-locations: classpath:mapper/**/*.xml
      type-aliases-package: com.sweetk.keep.domain

  application-dev.yml: |
    spring:
      config:
        activate:
          on-profile: dev

      datasource:
        driver-class-name: net.sf.log4jdbc.sql.jdbcapi.DriverSpy
        url: jdbc:log4jdbc:mysql://192.168.90.192:23306/epa
        username: epa
        password: epa#2025

    api:
      ip: http://192.168.90.192:18000
