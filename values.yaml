fullnameOverride: keep-admin
replicaCount: 1

image:
  repository: yeonjae0426/keep-admin
  tag: "1.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80

# 컨테이너(앱)가 실제로 리슨하는 포트
containerPort: 8080

# CPU 노드에만 배치
nodeSelector:
  node-role: cpu

tolerations: []
affinity: {}
resources: {}
env: {}
