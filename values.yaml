fullnameOverride: keep-admin

replicaCount: 1

image:
  repository: yeonjae0426/keep-admin
  tag: "1.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80

# 실제 컨테이너가 사용하는 포트 (Spring Boot 기본 8080)
containerPort: 8080

# ingress는 나중에 사용할 수 있도록 유지
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts: []
  tls: []

# CPU 노드로만 스케줄링
nodeSelector:
  node-role: cpu

tolerations: []

affinity: {}

resources: {}

env: {}

autoscaling:
  enabled: false

serviceAccount:
  create: false
  name: ""
